<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zootopia 2 Chromes</title>
    
    <link rel="apple-touch-icon" href="applogo.png">
    <link rel="icon" type="image/png" href="applogo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">

    <style>
        /* CSS: Mobile-first styling */
        :root {
            --green: #4CAF50;
            --gray: #9E9E9E;
            --gold: #FFD700;
            --orange: #FF9800;
            /* Lowered opacity from 0.85 to 0.5 to let the background image pop */
            --bg-overlay: rgba(30, 30, 30, 0.5); 
            --panel: rgba(42, 42, 42, 0.85); /* Slightly transparent panels */
            --nav-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text);
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            padding-bottom: 80px; 
            overflow-x: hidden;
            /* Text shadow added to ensure text is readable over brighter backgrounds */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .app-container {
            min-height: 100vh;
            background-color: var(--bg-overlay);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-logo {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 10px auto 30px auto;
            /* Drop shadow for the logo */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        /* View Management with Animations */
        .view-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            flex-grow: 1;
        }

        .view {
            display: none; 
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .view.active {
            display: flex; 
        }

        .view.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* Stats (Home View) */
        .stats-container {
            text-align: center;
            margin-top: 40px;
        }

        .collected-num {
            font-size: 6rem;
            font-weight: 800;
            color: var(--green);
            line-height: 1;
            /* Extra strong shadow to make the green number stand out */
            text-shadow: 2px 3px 8px rgba(0, 0, 0, 0.9);
        }

        .missing-num {
            font-size: 1.5rem;
            color: #d1d1d1;
            margin-top: 5px;
            display: block;
        }

        /* Search View */
        .controls-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #444;
            border-radius: 12px;
            background: var(--panel);
            color: white;
            box-sizing: border-box;
            text-align: center;
            transition: border-color 0.3s ease;
            text-shadow: none; /* No shadow inside the input box */
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--green);
        }

        .btn {
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            background-color: var(--panel);
            border: 1px solid #444;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            background-color: #555;
            transform: scale(0.98);
        }

        #searchResult {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5rem;
            margin: 10px 0;
            transition: color 0.3s ease;
        }

        /* Library View */
        .library-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .chrome-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 1.1rem;
            transition: transform 0.1s, background-color 0.2s, color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-shadow: none; /* Keep the numbers clean */
        }

        .chrome-item:active {
            transform: scale(0.9);
        }

        /* Bottom Navigation Menu */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            box-shadow: 0 -2px 15px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: color 0.3s, transform 0.2s;
            text-shadow: none;
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        .nav-btn.active {
            color: var(--green);
        }

        .nav-label {
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: bold;
        }

        /* Color Coding */
        .status-missing { background-color: rgba(158, 158, 158, 0.85); color: #111; }
        .status-collected-normal { background-color: rgba(76, 175, 80, 0.95); color: white; }
        .status-collected-p { background-color: rgba(255, 152, 0, 0.95); color: white; }
    </style>
</head>
<body>

    <div class="app-container">
        <img src="logo.png" alt="Zootopia 2 Logo" class="app-logo" onerror="this.style.display='none'">

        <div class="view-wrapper">
            <div id="view-home" class="view active fade-in">
                <div class="stats-container">
                    <div class="collected-num" id="collectedCount">0</div>
                    <div class="missing-num" id="missingCount">204 to Collect!</div>
                </div>
            </div>

            <div id="view-search" class="view">
                <div class="controls-container">
                    <input type="text" id="searchInput" placeholder="Enter number (e.g., 5 or P3)">
                    <button class="btn" onclick="searchChrome()">Search Database</button>
                    <div id="searchResult"></div>
                </div>
            </div>

            <div id="view-library" class="view">
                <div class="library-container" id="library">
                    </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" id="nav-search" onclick="switchView('search')">
            🔍<span class="nav-label">Search</span>
        </button>
        <button class="nav-btn active" id="nav-home" onclick="switchView('home')">
            🏠<span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" id="nav-library" onclick="switchView('library')">
            📚<span class="nav-label">Library</span>
        </button>
    </div>

    <script>
        const totalNormal = 188;
        const totalP = 16;
        let collectedChromes = new Set();
        let isAnimating = false; 

        // Load saved data
        const savedData = localStorage.getItem('zootopia2Chromes');
        if (savedData) {
            collectedChromes = new Set(JSON.parse(savedData));
        }

        // View Navigation with Animations
        function switchView(viewName) {
            if (isAnimating) return;
            
            const currentView = document.querySelector('.view.active');
            const nextView = document.getElementById(`view-${viewName}`);
            
            if (currentView === nextView) return;

            isAnimating = true;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${viewName}`).classList.add('active');

            currentView.classList.remove('fade-in');
            
            setTimeout(() => {
                currentView.classList.remove('active');
                
                if (viewName === 'library' && document.getElementById('library').children.length === 0) {
                    renderLibrary();
                }
                
                nextView.classList.add('active');
                
                void nextView.offsetWidth; 
                
                nextView.classList.add('fade-in');
                
                setTimeout(() => {
                    isAnimating = false;
                }, 250);

            }, 250); 
        }

        function saveDatabase() {
            localStorage.setItem('zootopia2Chromes', JSON.stringify([...collectedChromes]));
        }

        // Smooth Counter Animation Logic
        function animateNumber(id, start, end, duration) {
            const element = document.getElementById(id);
            if (start === end) {
                element.innerText = end;
                return;
            }
            
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Easing function to make it slow down as it approaches the final number
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentNumber = Math.floor(easeOut * (end - start) + start);
                
                element.innerText = currentNumber;
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    element.innerText = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateStats() {
            const total = totalNormal + totalP;
            const collected = collectedChromes.size;
            
            // Get the number currently visible on screen (defaults to 0 on first load)
            const countElement = document.getElementById('collectedCount');
            const currentDisplayedNumber = parseInt(countElement.innerText) || 0;
            
            // Animate from what's on screen to the actual collected count
            animateNumber('collectedCount', currentDisplayedNumber, collected, 1200);
            
            document.getElementById('missingCount').innerText = `${total - collected} to Collect!`;
        }

        function searchChrome() {
            let input = document.getElementById('searchInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('searchResult');

            if (!input) {
                resultDiv.innerText = "";
                return;
            }

            if (collectedChromes.has(input)) {
                resultDiv.style.color = 'var(--green)';
                resultDiv.style.textShadow = '1px 1px 2px black';
                resultDiv.innerText = `${input} - You already have it!`;
            } else {
                resultDiv.style.color = 'var(--gold)';
                resultDiv.style.textShadow = '1px 1px 2px black';
                resultDiv.innerText = `${input} - You need this one!`;
            }
        }

        function toggleChrome(id) {
            if (collectedChromes.has(id)) {
                collectedChromes.delete(id);
            } else {
                collectedChromes.add(id);
            }
            saveDatabase();
            
            // Fast animation (300ms) when tapping buttons manually, instead of the 1200ms load animation
            const total = totalNormal + totalP;
            const collected = collectedChromes.size;
            const currentDisplayedNumber = parseInt(document.getElementById('collectedCount').innerText) || 0;
            animateNumber('collectedCount', currentDisplayedNumber, collected, 300);
            document.getElementById('missingCount').innerText = `${total - collected} missing`;
            
            renderLibrary(); 
            
            if(document.getElementById('searchInput').value) {
                searchChrome();
            }
        }

        function renderLibrary() {
            const lib = document.getElementById('library');
            lib.innerHTML = '';

            for (let i = 1; i <= totalNormal; i++) {
                const id = i.toString();
                lib.appendChild(createChromeElement(id, false));
            }

            for (let i = 1; i <= totalP; i++) {
                const id = `P${i}`;
                lib.appendChild(createChromeElement(id, true));
            }
        }

        function createChromeElement(id, isP) {
            const el = document.createElement('div');
            el.className = 'chrome-item ';
            el.innerText = id;

            if (collectedChromes.has(id)) {
                el.className += isP ? 'status-collected-p' : 'status-collected-normal';
            } else {
                el.className += 'status-missing';
            }

            el.onclick = () => toggleChrome(id);
            return el;
        }

        // Initialize application stats (triggers the initial load animation)
        updateStats();
    </script>
</body>
</html>
